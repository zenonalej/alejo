<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Cartelería Digital - Universidad Modular Abierta - Regional Sonsonate</title>

  <style>
    /* ══════════════════════════════════════════════
       RESET & BASE
    ══════════════════════════════════════════════ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --marquee-height: 56px;
      --marquee-bg: rgba(0, 0, 0, 0.75);
      --marquee-color: #ffffff;
      --marquee-font-size: clamp(1rem, 2.4vw, 1.5rem);
      --logo-size: clamp(80px, 10vw, 160px);
      --logo-margin: clamp(16px, 2.5vw, 36px);
      --overlay-gradient: linear-gradient(
        to bottom,
        rgba(0,0,0,0.18) 0%,
        rgba(0,0,0,0.0)  40%,
        rgba(0,0,0,0.0)  70%,
        rgba(0,0,0,0.55) 100%
      );
      --accent: #e8c84a; /* Color dorado/amarillo institucional */
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', Arial, sans-serif;
      cursor: none;
    }

    #app { position: relative; width: 100vw; height: 100vh; overflow: hidden; }

    #bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      transition: opacity 0.6s ease;
    }

    #bg-video.fading { opacity: 0; }

    #overlay {
      position: absolute;
      inset: 0;
      background: var(--overlay-gradient);
      z-index: 2;
      pointer-events: none;
    }

    #logo-wrap {
      position: absolute;
      top: var(--logo-margin);
      right: var(--logo-margin);
      z-index: 10;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      animation: fadeSlideDown 0.8s ease forwards;
    }

    #logo-img {
      width: var(--logo-size);
      height: auto;
      object-fit: contain;
      display: block;
    }

    #logo-text {
      color: #fff;
      font-size: 1.2rem;
      font-weight: 700;
      display: none;
    }

    #marquee-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--marquee-height);
      background: var(--marquee-bg);
      z-index: 10;
      display: flex;
      align-items: center;
      overflow: hidden;
      border-top: 3px solid var(--accent);
    }

    #marquee-label {
      flex-shrink: 0;
      padding: 0 20px;
      height: 100%;
      display: flex;
      align-items: center;
      background: var(--accent);
      color: #000;
      font-weight: 800;
      text-transform: uppercase;
    }

    #marquee-window { flex: 1; overflow: hidden; height: 100%; display: flex; align-items: center; position: relative; }

    #marquee-text {
      display: inline-block;
      white-space: nowrap;
      color: var(--marquee-color);
      font-size: var(--marquee-font-size);
      padding-left: 100%;
      animation: marqueeScroll 25s linear infinite;
    }

    #loading-screen {
      position: absolute;
      inset: 0;
      z-index: 100;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.8s ease;
    }

    #loading-screen.hidden { opacity: 0; pointer-events: none; }

    .loader-ring {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes marqueeScroll { from { transform: translateX(0%); } to { transform: translateX(-100%); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeSlideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div id="app">
  <div id="loading-screen">
    <div class="loader-ring"></div>
    <p id="loading-msg" style="color:white">Cargando Sistema...</p>
  </div>

  <video id="bg-video" autoplay muted playsinline></video>
  <div id="overlay"></div>

  <div id="logo-wrap">
    <img id="logo-img" src="" alt="Logo" onerror="this.style.display='none'; document.getElementById('logo-text').style.display='block'" />
    <span id="logo-text">UNIVERSIDAD MODULAR ABIERTA</span>
  </div>

  <div id="marquee-bar">
    <div id="marquee-label">AVISOS</div>
    <div id="marquee-window">
      <span id="marquee-text">Cargando avisos...</span>
    </div>
  </div>
</div>

<script>
  "use strict";

  // Configuración para InfinityFree (PHP)
  const API_URL = "api.php";
  
  const state = {
    playlist: [],
    currentIndex: 0,
    config: {},
    initialized: false
  };

  const videoEl = document.getElementById("bg-video");
  const loadingScreen = document.getElementById("loading-screen");
  const marqueeText = document.getElementById("marquee-text");
  const logoImg = document.getElementById("logo-img");

  async function fetchData() {
    try {
      const res = await fetch(API_URL + '?t=' + Date.now()); // Evita caché
      const data = await res.json();
      
      // Actualizar marquesina y logo
      if (data.branding) {
        marqueeText.innerText = data.branding.marqueeText || "";
        logoImg.src = data.branding.logoUrl || "";
      }

      // Actualizar playlist
      if (data.playlist && data.playlist.length > 0) {
        state.playlist = data.playlist;
      }
    } catch (err) {
      console.error("Error cargando datos del servidor", err);
    }
  }

  function playNext() {
    if (state.playlist.length === 0) return;

    const videoUrl = state.playlist[state.currentIndex];
    videoEl.classList.add("fading");

    setTimeout(() => {
      videoEl.src = videoUrl;
      videoEl.load();
      videoEl.play().then(() => {
        videoEl.classList.remove("fading");
      }).catch(advance);
    }, 400);
  }

  function advance() {
    state.currentIndex++;
    if (state.currentIndex >= state.playlist.length) {
      state.currentIndex = 0;
      fetchData().then(playNext); // Sincroniza al final de cada vuelta
    } else {
      playNext();
    }
  }

  videoEl.addEventListener("ended", advance);
  videoEl.addEventListener("error", () => setTimeout(advance, 3000));

  async function init() {
    await fetchData();
    if (state.playlist.length > 0) {
      loadingScreen.classList.add("hidden");
      playNext();
    } else {
      document.getElementById("loading-msg").innerText = "No hay videos en la carpeta /media";
    }
  }

  init();
  // Polling de seguridad cada 5 minutos
  setInterval(fetchData, 300000);
</script>

</body>
</html>
